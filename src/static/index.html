<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Search & Research</title>
  <style>
    :root{color-scheme:dark;--bg:#0d1117;--panel:#161b22;--line:#30363d;--text:#e6edf3;--muted:#8b949e;--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:14px/1.55 system-ui,-apple-system,"PingFang SC",sans-serif}
    main{max-width:980px;margin:0 auto;padding:36px 18px 80px} h1{margin:0;font-size:28px} header p{color:var(--muted);margin:6px 0 26px}
    .panel,.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin:12px 0}
    .search{display:flex;gap:10px}.search input{flex:1}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-top:12px}
    label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:12px} input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:7px;padding:9px}
    button{border:0;border-radius:8px;background:var(--blue);color:#08111c;padding:9px 16px;font-weight:700;cursor:pointer}button:disabled{opacity:.45;cursor:not-allowed}
    button.secondary{background:transparent;color:var(--blue);border:1px solid var(--blue)} .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .sources label{display:inline-flex;flex-direction:row;align-items:center;margin-right:14px}.sources input{width:auto}
    .meta{display:flex;gap:8px;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:3px 9px;color:var(--muted)}.pill b{color:var(--text)}
    .title{color:var(--blue);font-size:16px;text-decoration:none;font-weight:650}.muted{color:var(--muted)}.passage{margin-top:8px;white-space:pre-wrap}.tags{margin-top:10px}.tags span{display:inline-block;background:var(--bg);border-radius:5px;padding:2px 7px;margin:0 6px 4px 0;color:var(--muted);font-size:12px}
    .warning{border-color:#6e531a;color:#e3b341}.error{color:var(--red)}.good{color:var(--green)} h2{font-size:18px;margin:28px 0 8px} h3{font-size:15px;margin:0 0 8px}.hidden{display:none}.gap{border-left:3px solid var(--yellow);padding-left:10px;margin:8px 0}.spinner{color:var(--blue)}
    code{word-break:break-all;color:#a5d6ff}@media(max-width:640px){.search{flex-direction:column}}
  </style>
</head>
<body><main>
  <header><h1>Search & Research</h1><p>轻量搜索负责发现，可信研究负责补证、反证与覆盖评估。</p></header>
  <section class="panel">
    <div class="search"><input id="query" placeholder="输入研究问题" autofocus><button id="searchBtn">搜索</button></div>
    <div class="grid">
      <label>返回条数<input id="limit" type="number" min="1" max="20" value="10"></label>
      <label>起始日期<input id="from" type="date"></label><label>结束日期<input id="to" type="date"></label>
      <label>语言（逗号分隔）<input id="languages" placeholder="zh,en"></label><label>辖区（逗号分隔）<input id="jurisdictions" placeholder="CN,US,EP,WO"></label>
      <label>API Token<input id="token" type="password" placeholder="可选"></label>
    </div>
    <div class="sources" style="margin-top:12px"><span class="muted">来源类型（不勾选=自动路由）　</span><label><input type="checkbox" value="web">网页</label><label><input type="checkbox" value="academic">学术</label><label><input type="checkbox" value="patent">专利</label></div>
  </section>
  <div id="searchStatus" class="muted"></div><div id="searchMeta" class="meta"></div><div id="searchGaps"></div><div id="evidence"></div>

  <section id="researchPanel" class="panel hidden">
    <h2 style="margin-top:0">提升可信度</h2><p class="muted">Research 将固定使用本次 search seed，执行补充检索、全文读取与 claim 校验。</p>
    <div class="grid"><label>研究类型<select id="profile"><option value="technology_validation">技术验证</option><option value="literature_review">文献综述</option><option value="prior_art_landscape">现有技术/专利全景</option><option value="technology_landscape">技术全景</option></select></label><label>深度<select id="depth"><option value="quick">quick</option><option value="standard" selected>standard</option><option value="deep">deep</option></select></label></div>
    <label style="margin-top:12px">需要优先验证的 claim（每行一条，可空）<textarea id="claims" rows="3"></textarea></label>
    <div class="row" style="margin-top:12px"><button id="researchBtn">开始研究</button><button id="cancelBtn" class="secondary hidden">取消</button><span id="researchStatus" class="muted"></span></div>
  </section>
  <section id="dossier" class="hidden"><h2>Research Dossier</h2><div id="researchMeta" class="meta"></div><div id="findings"></div><h3>剩余缺口</h3><div id="researchGaps"></div></section>
</main>
<script>
  const $=id=>document.getElementById(id); let searchSeed=null,researchId=null,pollTimer=null;
  $('token').value=localStorage.getItem('api_token')||'';
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const csv=id=>$(id).value.split(',').map(v=>v.trim()).filter(Boolean);
  function headers(){const token=$('token').value.trim();if(token)localStorage.setItem('api_token',token);else localStorage.removeItem('api_token');return {'Content-Type':'application/json',...(token?{Authorization:'Bearer '+token}:{})}}
  async function jsonFetch(url,options={}){const res=await fetch(url,{...options,headers:{...headers(),...(options.headers||{})}});const body=await res.json().catch(()=>({detail:'响应不是 JSON'}));if(!res.ok)throw new Error(body.detail||`HTTP ${res.status}`);return body}
  function searchBody(){const filters={languages:csv('languages'),jurisdictions:csv('jurisdictions')};if($('from').value)filters.published_from=$('from').value;if($('to').value)filters.published_to=$('to').value;const selected=[...document.querySelectorAll('.sources input:checked')].map(x=>x.value);return{query:$('query').value.trim(),limit:Number($('limit').value)||10,...(selected.length?{source_types:selected}:{}),filters}}
  $('query').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch()});$('searchBtn').onclick=runSearch;
  async function runSearch(){if(!$('query').value.trim())return;$('searchBtn').disabled=true;$('searchStatus').innerHTML='<span class="spinner">检索中…</span>';$('evidence').innerHTML='';$('searchGaps').innerHTML='';$('researchPanel').classList.add('hidden');$('dossier').classList.add('hidden');try{const d=await jsonFetch('/search',{method:'POST',body:JSON.stringify(searchBody())});searchSeed=d.research_seed;$('searchStatus').textContent='';$('searchMeta').innerHTML=`<span class="pill">状态 <b>${esc(d.status)}</b></span><span class="pill">证据 <b>${d.result_set.returned}</b></span><span class="pill">检索质量 <b>${esc(d.retrieval_assessment.status)}</b></span><span class="pill">耗时 <b>${d.meta.elapsed_ms}ms</b></span>`+(searchSeed?`<span class="pill">seed <code>${esc(searchSeed.search_id)}</code></span>`:'');$('searchGaps').innerHTML=(d.retrieval_assessment.gaps||[]).map(g=>`<div class="panel warning"><b>${esc(g.code)}</b> ${esc(g.message)}</div>`).join('');$('evidence').innerHTML=(d.evidence||[]).map(e=>`<article class="card"><a class="title" href="${esc(e.url)}" target="_blank" rel="noreferrer">${esc(e.title||e.url)}</a><div class="muted">${esc(e.type)} · ${esc(e.provenance?.publisher_name||e.source)} · ${esc(e.published_date)}</div><div class="passage">${esc(e.passage?.text)}</div><div class="tags"><span>${esc(e.quality?.level||'unavailable')}</span><span>${esc(e.passage?.snippet_type)}</span></div></article>`).join('');if(searchSeed)$('researchPanel').classList.remove('hidden')}catch(e){$('searchStatus').innerHTML=`<span class="error">${esc(e.message)}</span>`}finally{$('searchBtn').disabled=false}}
  $('researchBtn').onclick=async()=>{if(!searchSeed)return;$('researchBtn').disabled=true;$('researchStatus').textContent='提交中…';const lines=$('claims').value.split('\n').map(v=>v.trim()).filter(Boolean);const body={search_id:searchSeed.search_id,profile:$('profile').value,depth:$('depth').value,objective:{question:$('query').value.trim(),claims:lines.map(text=>({text,importance:'key'}))}};try{const d=await jsonFetch('/research',{method:'POST',headers:{'Idempotency-Key':crypto.randomUUID()},body:JSON.stringify(body)});researchId=d.research_id;$('cancelBtn').classList.remove('hidden');renderTask(d);poll()}catch(e){$('researchStatus').innerHTML=`<span class="error">${esc(e.message)}</span>`;$('researchBtn').disabled=false}}
  $('cancelBtn').onclick=async()=>{if(!researchId)return;try{renderTask(await jsonFetch(`/research/${researchId}/cancel`,{method:'POST',body:'{}'}))}catch(e){$('researchStatus').innerHTML=`<span class="error">${esc(e.message)}</span>`}};
  function poll(){clearTimeout(pollTimer);pollTimer=setTimeout(async()=>{try{const d=await jsonFetch(`/research/${researchId}?detail=full`);renderTask(d);if(['queued','running'].includes(d.state))poll()}catch(e){$('researchStatus').innerHTML=`<span class="error">${esc(e.message)}</span>`}},900)}
  function renderTask(d){$('researchStatus').textContent=`${d.state}${d.phase?' · '+d.phase:''}`;if(['queued','running'].includes(d.state))return;clearTimeout(pollTimer);$('researchBtn').disabled=false;$('cancelBtn').classList.add('hidden');if(!d.dossier)return;$('dossier').classList.remove('hidden');const a=d.dossier.assessment;$('researchMeta').innerHTML=`<span class="pill">任务 <b>${esc(d.state)}</b></span><span class="pill">结论 <b>${esc(a.overall)}</b></span><span class="pill">轮次 <b>${d.progress.rounds_completed}</b></span><span class="pill">采纳证据 <b>${d.progress.evidence_adopted}</b></span><span class="pill">深读 <b>${d.progress.deep_reads}</b></span><span class="pill">停止 <b>${esc(d.stop?.reason)}</b></span>`;$('findings').innerHTML=(d.dossier.findings||[]).map(f=>`<article class="card"><h3>${esc(f.claim.text)}</h3><div>状态：<b>${esc(f.assessment.status)}</b>　置信度：<b>${esc(f.assessment.confidence)}</b></div><div class="muted">支持 ${f.assessment.support_refs.length} · 冲突 ${f.assessment.conflict_refs.length} · 独立支持 ${f.assessment.independent_support_count}</div></article>`).join('');$('researchGaps').innerHTML=(d.dossier.coverage.gaps||[]).map(g=>`<div class="gap"><b>${esc(g.code)}</b> ${esc(g.message)}<div class="muted">${esc(g.suggested_action||'')}</div></div>`).join('')||'<span class="good">未发现剩余覆盖缺口</span>'}
</script></body></html>
